      - link "← Projects" [ref=e21] [cursor=pointer]:
        - /url: /projects
      - paragraph [ref=e22]: Builder Clarity
      - heading "GoHighLevel ↔ JobTread Integration" [level=1] [ref=e23]
      - paragraph [ref=e24]: Multi-tenant, bidirectional integration between GoHighLevel CRM and JobTread project management — purpose-built for contractors.
      - generic [ref=e25]:
        - generic [ref=e26]: Pipedream
        - generic [ref=e27]: JavaScript
        - generic [ref=e28]: OAuth
        - generic [ref=e29]: REST APIs
        - generic [ref=e30]: Webhooks
    - generic [ref=e33]:
      - generic [ref=e34]:
        - heading "The Problem" [level=2] [ref=e35]
        - paragraph [ref=e36]: Contractors were managing jobs in JobTread and leads/clients in GoHighLevel with zero data flow between them — double entry, missed follow-ups, and no unified view of a customer journey.
      - generic [ref=e37]:
        - heading "The Approach" [level=2] [ref=e38]
        - paragraph [ref=e39]: "Designed a bidirectional data mapping strategy across hierarchical data structures in both platforms. Implemented waterfall smart record matching to prevent duplicates. Built with Pipedream using custom JavaScript components for nearly every step. Managed multi-tenant auth: Agency OAuth token for GoHighLevel with subaccount token logic, and Connected Organizations for JobTread."
      - generic [ref=e40]:
        - heading "Challenges" [level=2] [ref=e41]
        - paragraph [ref=e42]: Mapping strategy required mid-milestone refinement to meet dynamic stakeholder requirements. Handling multi-tenant auth across two platforms with different OAuth models added significant complexity. Preventing duplicate records during bidirectional sync required careful ordering and idempotency logic.
      - generic [ref=e43]:
        - heading "Outcome" [level=2] [ref=e44]
        - paragraph [ref=e45]: Delivered a scalable, multi-tenant integration product that became the foundation for Builder Clarity's productized offering — enabling contractors to keep their CRM and project management in sync without manual data entry.
