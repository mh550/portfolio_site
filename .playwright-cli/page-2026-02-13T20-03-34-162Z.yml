    - generic [ref=e20]:
      - paragraph [ref=e21]: About
      - heading "The Arc" [level=1] [ref=e22]
    - generic [ref=e23]:
      - paragraph [ref=e25]: "I graduated from Duke University with a B.S. in Computer Science and a minor in Visual & Media Studies — a combination that shaped how I think about software: the engineering has to work, and the experience has to feel right."
      - paragraph [ref=e27]: After graduating, I was hired as the first engineer at a startup. No playbook, no senior engineers to shadow — just a real product, real users, and a mandate to figure it out. I built scalable multi-tenant integration systems from scratch, migrated platforms when they stopped serving the product, and learned that good engineering is relentless attention to the user's actual problem.
      - paragraph [ref=e29]: My work centers on transforming complex, scattered processes into reliable, intuitive systems. I reject the idea of “user error” — if users are struggling, the system needs to be better. That philosophy drives every decision I make, from data mapping strategy to UI hierarchy.
    - heading "Philosophy" [level=2] [ref=e33]
    - blockquote [ref=e35]: “Design for the user first. Every abstraction, every API contract, every data model should ultimately serve the person on the other end of the interface.”
    - heading "Outside the Terminal" [level=2] [ref=e39]
    - paragraph [ref=e41]: "When I'm not building software, I'm usually on a mountain or a skateboard. I coached snowboarding at High Cascade Snowboard Camp for two summers — working with 12–18 athletes per session, designing drills, and figuring out how to explain complex movement patterns simply. That experience shaped how I approach collaboration and technical communication: meet people where they are, be patient, and break it down."
